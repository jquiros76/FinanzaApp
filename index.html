<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FinanzApp Pro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);font-family:'Segoe UI',sans-serif;color:#f1f5f9;min-height:100vh}
  input::placeholder{color:#475569}
  ::-webkit-scrollbar{height:4px;width:4px;background:transparent}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.2);border-radius:4px}
  @keyframes fadeIn{from{opacity:0;transform:translate(-50%,-10px)}to{opacity:1;transform:translate(-50%,0)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const CATEGORIES = {
  ingresos: [
    {id:"salario",label:"Salario",icon:"💼"},
    {id:"negocio",label:"Negocio",icon:"🏪"},
    {id:"freelance",label:"Freelance",icon:"💻"},
    {id:"inversiones",label:"Inversiones",icon:"📈"},
    {id:"otros_ing",label:"Otros",icon:"➕"},
  ],
  gastos: [
    {id:"vivienda",label:"Vivienda",icon:"🏠"},
    {id:"alimentacion",label:"Alimentación",icon:"🛒"},
    {id:"transporte",label:"Transporte",icon:"🚗"},
    {id:"servicios",label:"Servicios",icon:"💡"},
    {id:"salud",label:"Salud",icon:"🏥"},
    {id:"educacion",label:"Educación",icon:"📚"},
    {id:"entretenimiento",label:"Ocio",icon:"🎉"},
    {id:"deudas",label:"Deudas",icon:"💳"},
    {id:"ahorro",label:"Ahorro",icon:"🏦"},
    {id:"otros_gas",label:"Otros",icon:"📦"},
  ],
};

const MONTHS = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
const fmt = (v) => new Intl.NumberFormat("es-US",{style:"currency",currency:"USD",minimumFractionDigits:0}).format(v||0);
const initData = () => { const m={}; MONTHS.forEach((_,i)=>{m[i]={ingresos:{},gastos:{}}}); return m; };

function App(){
  const [screen,setScreen] = useState("dashboard");
  const [month,setMonth] = useState(new Date().getMonth());
  const [data,setData] = useState(initData());
  const [form,setForm] = useState({tipo:"gastos",cat:"",monto:"",desc:""});
  const [txs,setTxs] = useState([]);
  const [toast,setToast] = useState(null);

  const showToast=(msg,color="#10b981")=>{setToast({msg,color});setTimeout(()=>setToast(null),2500)};

  const totals=(idx)=>{
    const d=data[idx];
    const ing=Object.values(d.ingresos).reduce((a,b)=>a+b,0);
    const gas=Object.values(d.gastos).reduce((a,b)=>a+b,0);
    return {ing,gas,bal:ing-gas};
  };

  const add=()=>{
    const monto=parseFloat(form.monto);
    if(!form.cat||!monto||monto<=0){showToast("Completa todos los campos","#ef4444");return;}
    setData(prev=>{
      const u={...prev};
      u[month]={...u[month]};
      u[month][form.tipo]={...u[month][form.tipo]};
      u[month][form.tipo][form.cat]=(u[month][form.tipo][form.cat]||0)+monto;
      return u;
    });
    setTxs(prev=>[{id:Date.now(),month,tipo:form.tipo,cat:form.cat,monto,desc:form.desc,fecha:new Date().toLocaleDateString("es")},...prev]);
    showToast(form.tipo==="ingresos"?"✅ Ingreso guardado":"✅ Gasto guardado");
    setForm({tipo:form.tipo,cat:"",monto:"",desc:""});
  };

  const {ing,gas,bal}=totals(month);
  const savRate=ing>0?((bal/ing)*100).toFixed(1):0;
  const expRate=ing>0?((gas/ing)*100).toFixed(1):0;
  const yearly=MONTHS.map((_,i)=>totals(i));
  const cats=CATEGORIES[form.tipo];

  const btn=(s,label)=>(
    <button onClick={()=>setScreen(s)} style={{background:screen===s?"linear-gradient(135deg,#6366f1,#8b5cf6)":"rgba(255,255,255,0.07)",border:"none",color:"#fff",borderRadius:12,padding:"8px 12px",cursor:"pointer",fontWeight:screen===s?700:400,fontSize:11,whiteSpace:"nowrap"}}>
      {label}
    </button>
  );

  return (
    <div style={{minHeight:"100vh"}}>
      {toast&&<div style={{position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",background:toast.color,color:"#fff",padding:"10px 24px",borderRadius:30,fontWeight:700,zIndex:999,fontSize:14,boxShadow:"0 4px 20px rgba(0,0,0,0.4)",animation:"fadeIn 0.3s ease"}}>{toast.msg}</div>}

      {/* HEADER */}
      <div style={{background:"rgba(255,255,255,0.05)",backdropFilter:"blur(20px)",borderBottom:"1px solid rgba(255,255,255,0.08)",padding:"14px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100}}>
        <div>
          <div style={{fontSize:17,fontWeight:800,letterSpacing:"-0.5px"}}>💎 FinanzApp Pro</div>
          <div style={{fontSize:10,color:"#94a3b8"}}>Tu dinero, bajo control</div>
        </div>
        <div style={{display:"flex",gap:6}}>
          {btn("dashboard","📊 Dashboard")}
          {btn("registro","➕ Registrar")}
          {btn("analisis","📈 Análisis")}
        </div>
      </div>

      {/* MONTH BAR */}
      <div style={{overflowX:"auto",padding:"12px 16px 0",display:"flex",gap:6}}>
        {MONTHS.map((m,i)=>{
          const {bal:b}=totals(i);
          return(
            <button key={i} onClick={()=>setMonth(i)} style={{flexShrink:0,background:month===i?"linear-gradient(135deg,#6366f1,#8b5cf6)":"rgba(255,255,255,0.06)",border:month===i?"none":"1px solid rgba(255,255,255,0.1)",color:"#fff",borderRadius:10,padding:"7px 12px",cursor:"pointer",fontWeight:month===i?700:400,fontSize:11}}>
              {m}
              {b!==0&&<span style={{display:"block",fontSize:8,marginTop:1,color:b>0?"#4ade80":"#f87171",fontWeight:600}}>{b>0?"▲":"▼"}</span>}
            </button>
          );
        })}
      </div>

      <div style={{padding:"16px",maxWidth:860,margin:"0 auto"}}>

        {/* ── DASHBOARD ── */}
        {screen==="dashboard"&&(
          <div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:20}}>
              {[
                {label:"Ingresos",value:ing,icon:"💚",color:"#10b981",bg:"rgba(16,185,129,0.12)"},
                {label:"Gastos",value:gas,icon:"🔴",color:"#ef4444",bg:"rgba(239,68,68,0.12)"},
                {label:"Balance",value:bal,icon:bal>=0?"✨":"⚠️",color:bal>=0?"#6366f1":"#f59e0b",bg:bal>=0?"rgba(99,102,241,0.12)":"rgba(245,158,11,0.12)"},
              ].map(({label,value,icon,color,bg})=>(
                <div key={label} style={{background:bg,borderRadius:16,padding:"16px",border:`1px solid ${color}30`}}>
                  <div style={{fontSize:20,marginBottom:6}}>{icon}</div>
                  <div style={{fontSize:10,color:"#94a3b8",marginBottom:3}}>{label} — {MONTHS[month]}</div>
                  <div style={{fontSize:18,fontWeight:800,color}}>{fmt(value)}</div>
                </div>
              ))}
            </div>

            <div style={{background:"rgba(255,255,255,0.05)",borderRadius:16,padding:16,border:"1px solid rgba(255,255,255,0.08)",marginBottom:16}}>
              <div style={{fontWeight:700,marginBottom:14,fontSize:14}}>📊 Indicadores del mes</div>
              {[
                {label:"Tasa de Ahorro",value:Math.max(0,savRate),color:"#10b981",desc:`${savRate}% de ingresos ahorrado`},
                {label:"Tasa de Gasto",value:Math.min(100,expRate),color:expRate>80?"#ef4444":"#f59e0b",desc:`${expRate}% de ingresos gastado`},
              ].map(({label,value,color,desc})=>(
                <div key={label} style={{marginBottom:12}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                    <span style={{fontSize:12,color:"#cbd5e1"}}>{label}</span>
                    <span style={{fontSize:12,fontWeight:700,color}}>{desc}</span>
                  </div>
                  <div style={{background:"rgba(255,255,255,0.1)",borderRadius:8,height:8,overflow:"hidden"}}>
                    <div style={{width:`${Math.min(100,value)}%`,height:"100%",background:`linear-gradient(90deg,${color},${color}99)`,borderRadius:8,transition:"width 0.6s ease"}}/>
                  </div>
                </div>
              ))}
            </div>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              {["ingresos","gastos"].map(tipo=>{
                const catData=data[month][tipo];
                const total=Object.values(catData).reduce((a,b)=>a+b,0);
                const items=Object.entries(catData).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
                const catList=CATEGORIES[tipo];
                return(
                  <div key={tipo} style={{background:"rgba(255,255,255,0.05)",borderRadius:16,padding:16,border:"1px solid rgba(255,255,255,0.08)"}}>
                    <div style={{fontWeight:700,marginBottom:12,fontSize:13}}>{tipo==="ingresos"?"💚 Ingresos":"🔴 Gastos"} por categoría</div>
                    {items.length===0?(
                      <div style={{color:"#64748b",fontSize:12,textAlign:"center",padding:"16px 0"}}>Sin datos. Registra ➕</div>
                    ):items.map(([catId,val])=>{
                      const cat=catList.find(c=>c.id===catId);
                      const pct=total>0?(val/total*100).toFixed(0):0;
                      return(
                        <div key={catId} style={{marginBottom:8}}>
                          <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                            <span style={{fontSize:11}}>{cat?.icon} {cat?.label}</span>
                            <span style={{fontSize:11,fontWeight:700}}>{fmt(val)} ({pct}%)</span>
                          </div>
                          <div style={{background:"rgba(255,255,255,0.08)",borderRadius:4,height:5}}>
                            <div style={{width:`${pct}%`,height:"100%",borderRadius:4,background:tipo==="ingresos"?"linear-gradient(90deg,#10b981,#34d399)":"linear-gradient(90deg,#ef4444,#f87171)"}}/>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* ── REGISTRO ── */}
        {screen==="registro"&&(
          <div>
            <div style={{background:"rgba(255,255,255,0.05)",borderRadius:20,padding:20,border:"1px solid rgba(255,255,255,0.1)",marginBottom:20}}>
              <div style={{fontWeight:800,fontSize:16,marginBottom:16}}>Registrar en {MONTHS[month]}</div>
              <div style={{display:"flex",background:"rgba(0,0,0,0.3)",borderRadius:12,padding:4,marginBottom:16}}>
                {["ingresos","gastos"].map(t=>(
                  <button key={t} onClick={()=>setForm({...form,tipo:t,cat:""})} style={{flex:1,padding:"9px",borderRadius:9,border:"none",background:form.tipo===t?(t==="ingresos"?"linear-gradient(135deg,#10b981,#059669)":"linear-gradient(135deg,#ef4444,#dc2626)"):"transparent",color:"#fff",fontWeight:700,cursor:"pointer",fontSize:13}}>
                    {t==="ingresos"?"💚 Ingreso":"🔴 Gasto"}
                  </button>
                ))}
              </div>
              <div style={{marginBottom:16}}>
                <div style={{fontSize:11,color:"#94a3b8",marginBottom:8}}>Categoría</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
                  {cats.map(c=>(
                    <button key={c.id} onClick={()=>setForm({...form,cat:c.id})} style={{background:form.cat===c.id?"linear-gradient(135deg,#6366f1,#8b5cf6)":"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.1)",color:"#fff",borderRadius:10,padding:"7px 12px",cursor:"pointer",fontSize:12,fontWeight:form.cat===c.id?700:400}}>
                      {c.icon} {c.label}
                    </button>
                  ))}
                </div>
              </div>
              <div style={{marginBottom:14}}>
                <div style={{fontSize:11,color:"#94a3b8",marginBottom:6}}>Monto ($)</div>
                <input type="number" value={form.monto} onChange={e=>setForm({...form,monto:e.target.value})} placeholder="0.00" style={{width:"100%",padding:"12px 14px",background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:12,color:"#fff",fontSize:18,fontWeight:700,outline:"none"}}/>
              </div>
              <div style={{marginBottom:16}}>
                <div style={{fontSize:11,color:"#94a3b8",marginBottom:6}}>Descripción (opcional)</div>
                <input value={form.desc} onChange={e=>setForm({...form,desc:e.target.value})} placeholder="Ej: Supermercado, renta..." style={{width:"100%",padding:"10px 14px",background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:12,color:"#fff",fontSize:13,outline:"none"}}/>
              </div>
              <button onClick={add} style={{width:"100%",padding:"14px",background:"linear-gradient(135deg,#6366f1,#8b5cf6)",border:"none",borderRadius:14,color:"#fff",fontWeight:800,fontSize:15,cursor:"pointer",boxShadow:"0 4px 20px rgba(99,102,241,0.4)"}}>
                ✅ Guardar Registro
              </button>
            </div>
            <div style={{fontWeight:700,fontSize:14,marginBottom:12}}>📝 Últimas entradas — {MONTHS[month]}</div>
            {txs.filter(t=>t.month===month).length===0?(
              <div style={{color:"#64748b",textAlign:"center",padding:24,fontSize:13}}>Sin registros este mes</div>
            ):txs.filter(t=>t.month===month).slice(0,10).map(tx=>{
              const cat=CATEGORIES[tx.tipo].find(c=>c.id===tx.cat);
              return(
                <div key={tx.id} style={{background:"rgba(255,255,255,0.05)",borderRadius:14,padding:"12px 16px",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center",border:"1px solid rgba(255,255,255,0.07)"}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={{width:36,height:36,borderRadius:10,background:tx.tipo==="ingresos"?"rgba(16,185,129,0.2)":"rgba(239,68,68,0.2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>{cat?.icon}</div>
                    <div>
                      <div style={{fontWeight:600,fontSize:12}}>{cat?.label}</div>
                      <div style={{fontSize:10,color:"#64748b"}}>{tx.desc||tx.fecha}</div>
                    </div>
                  </div>
                  <div style={{fontWeight:800,fontSize:14,color:tx.tipo==="ingresos"?"#10b981":"#ef4444"}}>
                    {tx.tipo==="ingresos"?"+":"-"}{fmt(tx.monto)}
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* ── ANÁLISIS ── */}
        {screen==="analisis"&&(
          <div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:20}}>
              {[
                {label:"Ingresos Anuales",value:yearly.reduce((a,b)=>a+b.ing,0),color:"#10b981"},
                {label:"Gastos Anuales",value:yearly.reduce((a,b)=>a+b.gas,0),color:"#ef4444"},
                {label:"Balance Anual",value:yearly.reduce((a,b)=>a+b.bal,0),color:"#6366f1"},
              ].map(({label,value,color})=>(
                <div key={label} style={{background:"rgba(255,255,255,0.05)",borderRadius:16,padding:16,border:`1px solid ${color}30`,textAlign:"center"}}>
                  <div style={{fontSize:10,color:"#94a3b8",marginBottom:4}}>{label}</div>
                  <div style={{fontSize:18,fontWeight:800,color}}>{fmt(value)}</div>
                </div>
              ))}
            </div>

            <div style={{background:"rgba(255,255,255,0.05)",borderRadius:16,padding:16,border:"1px solid rgba(255,255,255,0.08)",marginBottom:16}}>
              <div style={{fontWeight:700,marginBottom:16,fontSize:14}}>📊 Ingresos vs Gastos por mes</div>
              <div style={{display:"flex",alignItems:"flex-end",gap:5,height:130,paddingBottom:6}}>
                {yearly.map((d,i)=>{
                  const maxV=Math.max(...yearly.map(x=>Math.max(x.ing,x.gas)),1);
                  const hI=(d.ing/maxV)*110; const hG=(d.gas/maxV)*110;
                  return(
                    <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                      <div style={{display:"flex",gap:2,alignItems:"flex-end",height:110}}>
                        <div style={{width:9,height:Math.max(2,hI),borderRadius:"3px 3px 0 0",background:month===i?"#10b981":"rgba(16,185,129,0.4)",transition:"height 0.4s"}}/>
                        <div style={{width:9,height:Math.max(2,hG),borderRadius:"3px 3px 0 0",background:month===i?"#ef4444":"rgba(239,68,68,0.4)",transition:"height 0.4s"}}/>
                      </div>
                      <div style={{fontSize:8,color:month===i?"#fff":"#64748b",fontWeight:month===i?700:400}}>{MONTHS[i]}</div>
                    </div>
                  );
                })}
              </div>
              <div style={{display:"flex",gap:16,marginTop:6,justifyContent:"center"}}>
                <div style={{display:"flex",alignItems:"center",gap:5,fontSize:10}}><div style={{width:8,height:8,borderRadius:2,background:"#10b981"}}/> Ingresos</div>
                <div style={{display:"flex",alignItems:"center",gap:5,fontSize:10}}><div style={{width:8,height:8,borderRadius:2,background:"#ef4444"}}/> Gastos</div>
              </div>
            </div>

            <div style={{background:"rgba(255,255,255,0.05)",borderRadius:16,padding:16,border:"1px solid rgba(255,255,255,0.08)"}}>
              <div style={{fontWeight:700,marginBottom:12,fontSize:14}}>🗓️ Resumen mensual</div>
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                  <thead>
                    <tr>{["Mes","Ingresos","Gastos","Balance","Ahorro %"].map(h=>(
                      <th key={h} style={{padding:"7px 10px",textAlign:"right",color:"#94a3b8",fontWeight:600,borderBottom:"1px solid rgba(255,255,255,0.08)"}}>{h}</th>
                    ))}</tr>
                  </thead>
                  <tbody>
                    {yearly.map((d,i)=>{
                      const rate=d.ing>0?((d.bal/d.ing)*100).toFixed(1):"—";
                      return(
                        <tr key={i} style={{background:month===i?"rgba(99,102,241,0.1)":"transparent",cursor:"pointer"}} onClick={()=>{setMonth(i);setScreen("dashboard")}}>
                          <td style={{padding:"9px 10px",fontWeight:month===i?700:400}}>{MONTHS[i]}</td>
                          <td style={{padding:"9px 10px",textAlign:"right",color:"#10b981"}}>{fmt(d.ing)}</td>
                          <td style={{padding:"9px 10px",textAlign:"right",color:"#ef4444"}}>{fmt(d.gas)}</td>
                          <td style={{padding:"9px 10px",textAlign:"right",fontWeight:700,color:d.bal>=0?"#6366f1":"#f87171"}}>{fmt(d.bal)}</td>
                          <td style={{padding:"9px 10px",textAlign:"right",color:parseFloat(rate)>20?"#10b981":"#f59e0b"}}>{rate}{rate!=="—"?"%":""}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
